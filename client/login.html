<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/login-auth.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="auth-page">
        <section class="auth">

            <h1 class="auth_title">Log in</h1>

            <form class="auth-form">

                <div class="auth-form_group">
                    <label for="username-or-email">Username or email</label>
                    <input id="username-or-email" type="text" class="auth-form_input form-control form-control-lg">
                    <span id="username-or-email-span" class="auth-error"></span>
                </div>

                <div class="auth-form_group">
                    <label for="password">Password</label>
                    <input id="password" type="password" class="auth-form_input form-control form-control-lg">
                    <span id="password-span" class="auth-error"></span>
                </div>

                <button class="auth-form_submit">Log in</button>

            </form>

            <div class="auth_switch">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>

        </section>


    </main>
    
    <script src="/Reusable-HTML/components/headerLoader.js"></script>    
    <script src="/Reusable-HTML/components/footerLoader.js"></script>
    <script type="module" src="/js/login.js"></script>

</body>
</html>
