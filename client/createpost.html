<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/create_post.css"></link>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
</head>
</head>
<body>

<div class="createpost-page">

    <div class="header">
        <div class="logo">logo</div>
        <div class="sell">sell</div>
        <div class="auth">auth</div>
    </div>

    <div class="createpost-content">

        <div class="form-title">Create new listing</div>

        <div class="form-block">
            <div class="form-label">Title</div>
            <input type="text" class="form-input">
        </div>

        <div class="form-block">
            <div class="form-label">Description</div>
            <textarea class="form-textarea"></textarea>
        </div>

        <div class="form-block">
            <div class="form-label">Price</div>
            <input type="text" class="form-input">
        </div>

        <div class="form-block">
            <div class="form-label">Location</div>
            <div class="dropdown">Select location</div>
        </div>

        <div class="form-block">
            <div class="form-label">Category</div>
            <div class="dropdown">Select category</div>
        </div>

        <div class="form-block">
            <div class="form-label">Images</div>

            <div class="image-upload">
                <div class="upload-box">Upload</div>
                <div class="upload-box"></div>
                <div class="upload-box"></div>
            </div>
        </div>

        <div class="form-actions">
            <button class="submit-btn">Publish</button>
            <button class="cancel-btn">Cancel</button>
        </div>

    </div>

    <div class="footer">
        <div class="footer-logo"></div>
        <div class="footer-content">© 2026 Sunnify. All rights reserved.</div>
    </div>

</div>

</body>
</html>
