<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunnify</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
</head>
<body>
    <main class ="main-page">
    
        <header class="header">
            <div class="header_logo">logo</div>
            <div class="header_sell">sell</div>
            <div class="header_auth">Login</div>
        </header>

        <section class="search">
            <input class='search_input' type="text" placeholder="Search">
            <input class="search_location" type="text" placeholder="Location">
            <button class="search-button">Go</div>
        </section>

        <section class="categories">
            <h2 id="categories-title">Categories</div>
            <div id="categories-list">
                <div class="category-item">Category 1</div>
                <div class="category-item">Category 2</div>
                <div class="category-item">Category 3</div>
            </div>
        </section>

        <section class="posts">
            <!-- post example -->
            <article class="post-card">
                <div class="post-card_image"></div>
                <div class="post-card_title">Flops</div>
                <div class="post-card_price">10.00</div>
                <div class="post-card_location">Oulu, Tuira</div>
                <button class="post-card_save">Save</button>
            </article>

            <article class="post-card">
                <div class="post-card_image"></div>
                <div class="post-card_title">Fishing rod</div>
                <div class="post-card_price">39.99</div>
                <div class="post-card_location">Oulu, Kontinkangas</div>
                <button class="post-card_save">Save</button>
            </article>
            
            <button id="posts_load-more">Load More</button>
        </section>

        <footer class="footer">
            <div class="footer_logo"></div>
            <div class="footer_content">© 2026 Sunnify. All rights reserved.</div>
        </footer>

    </main>
</body>
</html>
