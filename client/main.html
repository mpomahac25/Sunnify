<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunnify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <main>
        <div id="header-container"></div>

        <section class="search py-3 bg-light border-bottom">
            <div class="container">
                <form id="search-form" class="row g-2 justify-content-center">
                    <div class="col-12 col-md-4">
                        <input id="search-terms" class="form-control" type="text" placeholder="Search">
                    </div>
                    <div id="smart-location-dropdown-container" class="col-12 col-md-4 position-relative"></div>
                    <div class="col-12 col-md-2">
                        <button class="btn btn-primary w-100">Go</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="categories py-4">
            <div class="container">
                <h2 class="text-center mb-4">Categories</h2>
                <div class="row g-3">
                    <div class="col-4 text-center">
                        <button class="category-item btn btn-light w-100 py-3 shadow-sm">Img/Icon 1</button>
                        <p class="mt-2 fw-semibold">Category 1</p>
                    </div>
                    <div class="col-4 text-center">
                        <button class="category-item btn btn-light w-100 py-3 shadow-sm">Img/Icon 2</button>
                        <p class="mt-2 fw-semibold">Category 2</p>
                    </div>
                    <div class="col-4 text-center">
                        <button class="category-item btn btn-light w-100 py-3 shadow-sm">Img/Icon 3</button>
                        <p class="mt-2 fw-semibold">Category 3</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="posts py-4">
            <div class="container">
                <div class="row g-4" id="posts-list"></div>
                <div class="text-center mt-5">
                    <button class="btn btn-secondary" id="load-more-posts-btn">Load More</button>
                </div>
            </div>
        </section>

        <div id="footer-container"></div>
    </main>

    <script type="module" src="/Reusable-HTML/components/headerLoader.js"></script>
    <script type="module" src="/Reusable-HTML/components/footerLoader.js"></script>
    <script type="module" src="/Reusable-HTML/components/carouselLoader.js"></script>
    <script type="module" src="/Reusable-HTML/components/smartLocationDropdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/main.js"></script>
</body>
</html>
