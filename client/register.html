<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
    <link rel="stylesheet" href="css/login-auth.css">
</head>
<body>
    <div id="header-container"></div>
    <main class="auth-page">

        <section class="auth">

            <h1 class="auth_title">Create account</h1>

            <form class="auth-form">

                <div class="auth-form_group">
                    <label for="reg-username">Username</label>
                    <input id="reg-username" type="text" class="auth-form_input">
                    <span id="username-span" class="auth-error"></span>
                </div>

                <div class="auth-form_group">
                    <label for="email">Email</label>
                    <input id="email" type="email" class="auth-form_input">
                    <span id="email-span" class="auth-error"></span>
                </div>

                <div class="auth-form_group">
                    <label for="reg-password">Password</label>
                    <input id="reg-password" type="password" class="auth-form_input">
                    <span id="reg-password-span" class="auth-error"></span>
                </div>

                <div class="auth-form_group">
                    <label for="confirm-password">Confirm Password</label>
                    <input id="confirm-password" type="password" class="auth-form_input">
                    <span id="confirm-password-span" class="auth-error"></span>
                </div>

                <button class="auth-form_submit">Register</button>
            </form>
            <div class="auth_switch">Already have an account? <a href="login.html">Log in</a></div>
        </section>

    </main>
    
    <script src="/Reusable-HTML/components/headerLoader.js"></script>    
    <script src="/Reusable-HTML/components/footerLoader.js"></script>    

    <script type="module" src="js/register.js"></script>
</body>
</html>
