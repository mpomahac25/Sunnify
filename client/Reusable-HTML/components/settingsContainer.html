<div class="border rounded-3 p-3 bg-light">
    <div class="row g-3">
        <div class="col-12 col-md-6">
            <label for="settings-username" class="form-label">Change username</label>
            <input type="text"
                   class="form-control"
                   id="settings-username"
                   autocomplete="username">
            <span id="settings-username-span" class="auth-error"></span>
        </div>

        <div class="col-12 col-md-6">
            <label for="settings-email" class="form-label">Change email</label>
            <input type="email"
                   class="form-control"
                   id="settings-email"
                   autocomplete="email">
            <span id="settings-email-span" class="auth-error"></span>
        </div>

        <div class="col-12">
            <label for="settings-new-password" class="form-label">Change password</label>
            <input type="password"
                   class="form-control"
                   id="settings-new-password"
                   placeholder="Leave empty to keep current password"
                   autocomplete="new-password">
            <span id="settings-new-password-span" class="auth-error"></span>
        </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-4">
        <button class="btn btn-outline-secondary" id="settings-cancel-btn">
            Cancel
        </button>
        <button class="btn btn-primary" id="settings-apply-btn">
            Apply
        </button>
    </div>
</div>
