<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
    <div id="post-carousel-1" class="carousel slide" data-bs-ride="carousel" style="max-width: 500px; margin: 2rem auto;">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <div class="img-holder w-100 h-100" style="height:200px;"></div>
            </div>
            <div class="carousel-item">
                <div class="img-holder w-100 h-100" style="height:200px;"></div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#post-carousel-1" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#post-carousel-1" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
