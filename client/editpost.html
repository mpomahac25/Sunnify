<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/create_post.css">
</head>
<body>
    <main class="createpost-page">
        <div id="header-container"></div>
            <section class="py-5">
                <div class="container">
                    <div class="row g-4">
                        <div class="col-12 col-lg-8">
                            <div class="card border-0 shadow-sm createpost-form-card">
                                <div class="card-body p-4 p-md-5">
                                    <div class="d-flex justify-content-between align-items-center mb-4">
                                        <div>
                                            <h2 class="h3 mb-1">Edit post</h2>
                                        </div>
                                    </div>

                                    <form class="row g-4">
                                        <div class="col-12">
                                            <label for="listing-title" class="form-label fw-semibold">Title</label>
                                            <input id="listing-title" type="text" name="title" class="form-control form-control-lg" placeholder="">
                                        </div>

                                        <div class="col-12">
                                            <label for="listing-description" class="form-label fw-semibold">Description</label>
                                            <textarea id="listing-description" name="description" class="form-control createpost-textarea" placeholder=""></textarea>
                                        </div>

                                        <div class="col-12 col-md-6">
                                            <label for="listing-price" class="form-label fw-semibold">Price</label>
                                            <div class="input-group input-group-lg">
                                                <input id="listing-price" type="text" name="price" class="form-control" placeholder="25">
                                                <span class="input-group-text">EUR</span>
                                            </div>
                                        </div>

                                        <div class="col-12 col-md-6">
                                            <label for="listing-condition" class="form-label fw-semibold">Condition</label>
                                            <select id="listing-condition" name="condition" class="form-select form-select-lg">
                                                <option selected>Choose condition</option>
                                                <option value="Excellent">Excellent</option>
                                                <option value="Good">Good</option>
                                                <option value="Acceptable">Acceptable</option>
                                                <option value="Bad">Bad</option>
                                                <option value="Unusable, parts only">Unusable, parts only</option>
                                            </select>
                                        </div>

                                        <div id="smart-location-dropdown-container" class="col-12 col-md-6 position-relative">
                                            <label for="location-input" class="form-label fw-semibold">Location</label>
                                        </div>

                                        <div class="col-12 col-md-6">
                                            <label for="listing-category" class="form-label fw-semibold">Category</label>
                                            <select id="listing-category" name="category" class="form-select form-select-lg">
                                                <option selected>Select category</option>
                                                <option value="Clothes">Clothes</option>
                                                <option value="Home">Home</option>
                                                <option value="Kids">Kids</option>
                                            </select>
                                        </div>

                                        <div class="col-12">
                                            <label class="form-label fw-semibold">Images</label>
                                            <div class="row g-3">
                                                <div class="col-12 col-sm-4">
                                                    <button type="button" class="upload-box btn btn-light w-100">
                                                        <i class="bi bi-plus-circle fs-3"></i>
                                                        <span>Add cover</span>
                                                    </button>
                                                </div>
                                                <div class="col-12 col-sm-4">
                                                    <button type="button" class="upload-box btn btn-light w-100">
                                                        <i class="bi bi-image fs-3"></i>
                                                        <span>Add photo</span>
                                                    </button>
                                                </div>
                                                <div class="col-12 col-sm-4">
                                                    <button type="button" class="upload-box btn btn-light w-100">
                                                        <i class="bi bi-image fs-3"></i>
                                                        <span>Add photo</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-12">
                                            <div class="d-flex flex-column flex-md-row gap-3 pt-2">
                                                <button type="submit" class="btn btn-primary btn-lg flex-fill">Save changes</button>
                                                <button type="button" class="btn btn-outline-secondary btn-lg flex-fill">Cancel</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 col-lg-4">
                            <div class="card border-0 shadow-sm h-100 createpost-preview-card">
                                <div class="card-body p-4">
                                    <h2 class="h5 mb-3">Preview vibe</h2>
                                    <div class="img-container card shadow-sm">
                                        <!-- <div class="img-holder bg-secondary-subtle createpost-preview-media"></div> -->
                                        <div class="carousel-container"></div>

                                        <div class="card-body">
                                            <h3 class="h6 card-title mb-1">Your item title</h3>
                                            <p class="text-muted mb-2">City, District</p>
                                            <span class="fw-bold">0 EUR</span>
                                        </div>
                                        <div class="card-footer d-flex justify-content-end">
                                            <button class="favorite-btn btn btn-outline-danger btn-sm" type="button">
                                                <i class="bi bi-heart"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
        </section>

        
    </main>

    <div id="footer-container"></div>

    <script src="./Reusable-HTML/components/headerLoader.js"></script>    
    <script src="./Reusable-HTML/components/footerLoader.js"></script>    
    <script src="./Reusable-HTML/components/carouselLoader.js"></script>    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/editpost.js"></script>
</body>
</html>
