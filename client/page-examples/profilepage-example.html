<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="./../css/profile.css">
    <link rel="stylesheet" href="./../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
</head>
</head>
<body>
    <main class="profile-page-example">
        <header class="header">
            <div class="header-item" id="header_logo">logo</div>
            <div class="header-item" id="header_sell">sell</div>
            <div class="header-item" id="header_auth">login</div>
        </header>

        <section class="profile">

            <section class="profile-card">
                <div class="profile-card_image"></div>
                <div class="profile-card_info">
                    <div class="profile-item" id="profile-card_name">User Name</div>
                    <div class="profile-item" id="profile-card_rating">Rating: 4.5/5</div>
                    <div class="profile-item" id="profile-card_location">Location: Tuira</div>
                    <div class="profile-item" id="profile-card_since">Member since: Jan 2020</div>
                    <button class="profile-card_edit">Edit Profile</div>
                </div>
            </section>
            
            <nav class="profile-menu">
                <div class="profile-menu_item" id="saved-items-btn">Saved items</div>
                <div class="profile-menu_item" id="reviews-btn">Reviews</div>
                <div class="profile-menu_item" id="listings-btn">Listings</div>
                <div class="profile-menu_item" id="settings-btn">Settings</div>
            </nav>

            <section class="posts" id="saved_items">
                <div class="post">post1<!-- like post in main page (without buttons) + status + date --></div>
                <div class="post">post2</div>
                <div class="post">post3</div>

                <button class="show-more-btn">Show more</button>
            </section>

            <section class="profile-reviews">
                <div class="review">review1<!-- img + text + rating + date --></div>
                <div class="review">review2</div>

                <button class="show-more-btn">Show more</button>
            </section>

            <section class="posts" id="listings">
                <div class="post">post1</div>
                <div class="post">post2</div>
                <div class="post">post3</div>

                <button class="show-more-btn">Show more</button>
            </section>
        </section>

        <div class="footer">
            <div class="footer_logo"></div>
            <div class="footer_content">© 2026 Sunnify. All rights reserved.</div>
        </div>
    </main>
</body>
</html>
