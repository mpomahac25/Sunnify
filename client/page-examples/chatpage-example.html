<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="./../css/chat.css">
    <link rel="stylesheet" href="./../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
</head>
</head>
<body>
    <div class="chatpage-example">
        <div class="header">
            <div class="logo"></div>
            <div class="sell"></div>
            <div class="auth"></div>
        </div>

        <div class="chat-container">
            <div class="chat-sidebar">
                <div class="chat-user">
                    <div class="user-avatar"></div>
                </div>
                <div class="chat-user">
                    <div class="user-avatar"></div>
                </div>
        
            </div>

            <div class="chat-main">
                <div class="chat-header">
                    <div class="chat-user-info">
                        <div class="avatar"></div>
                        <div class="username">User Name</div>
                    </div>   
                </div>
                <div class="messages">
                    <div class="message-received">
                        <div class="message-text">Message 1</div>
                        <div class="message-time">10:00 AM</div>
                    </div>

                    <div class="message-sent">
                        <div class="message-text">Message 2</div>
                        <div class="message-time">10:01 AM</div>
                    </div>

                    <div class="message-received">
                        <div class="message-text">Message 3</div>
                        <div class="message-time">10:02 AM</div>
                    </div>
                </div>
                <div class="chat-input">
                    <input type="text" placeholder="Send message...">
                </div>
            </div>
        </div>
        <div class="footer">
            <div class="footer-logo"></div>
            <div class="footer-content">© 2026 Sunnify. All rights reserved.</div>
        </div>
    </div>
</body>
</html>
