<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Search — Sunnify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/search.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="search-page-example py-4 ">
        <div class="container">
            <div class="search-bar">
                <form class="d-flex gap-2 align-items-center">
                    <input class="form-control" type="text" placeholder="Search items, keywords..." aria-label="Search">
                    <input class="form-control" type="text" placeholder="Location" aria-label="Location">
                    <button class="btn btn-primary">Go</button>
                </form>
            </div>

            <div class="row g-4">
                <!-- mobile filter toggle -->
                <div class="col-12 d-lg-none">
                    <button class="btn btn-outline-secondary btn-sm w-100" type="button"
                            data-bs-toggle="collapse" data-bs-target="#filtersCollapse" aria-expanded="false"
                            aria-controls="filtersCollapse">
                        Show filters
                    </button>
                </div>

                <aside class="col-12 col-lg-3">
                    <!-- collapse so it hides on mobile and stays visible on lg+ -->
                    <div class="collapse d-lg-block" id="filtersCollapse">
                        <div class="card p-3 filters-card">
                            <h6 class="mb-3">Filters</h6>

                            <label class="form-label small">Price</label>
                            <div class="d-flex gap-2 mb-3">
                                <input class="form-control form-control-sm" name="price_min" placeholder="min">
                                <input class="form-control form-control-sm" name="price_max" placeholder="max">
                            </div>

                            <label class="form-label small" for="location-select">Location</label>
                            <select id="location-select" name="location" class="form-select form-select-sm mb-3" aria-label="Select location">
                                <option value="">Any</option>
                                <option value="Topilla">Topilla</option>
                                <option value="Tori">Tori</option>
                                <option value="Haukipudas">Haukipudas</option>
                                <option value="Pateniemi">Pateniemi</option>
                            </select>

                            <label class="form-label small" for="category-select">Category</label>
                            <select id="category-select" name="category" class="form-select form-select-sm mb-3" aria-label="Select category">
                                <option value="">All</option>
                                <option value="category1">Category 1</option>
                                <option value="category2">Category 2</option>
                                <option value="category3">Category 3</option>
                            </select>

                            <div class="d-flex gap-2">
                                <button id="apply-filters-btn" class="btn btn-primary btn-sm">Apply</button>
                                <button id="reset-filters-btn" class="btn btn-outline-secondary btn-sm" type="button">Reset</button>
                            </div>
                        </div>
                    </div>
                </aside>
                    <!-- result count + sort -->
                    <div class="ms-auto d-flex align-items-center gap-2">
                        <label for="sort-select" class="visually-hidden">Sort</label>
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
                                    id="sortDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                                More relevant
                            </button>
                            <ul class="dropdown-menu" aria-labelledby="sortDropdown">
                                <li><a class="dropdown-item active" href="#" data-value="relevance">Relevant</a></li>
                                <li><a class="dropdown-item" href="#" data-value="newest">Newest</a></li>
                                <li><a class="dropdown-item" href="#" data-value="price-asc">Price: Low to High</a></li>
                                <li><a class="dropdown-item" href="#" data-value="price-desc">Price: High to Low</a></li>
                            </ul>
                        </div>
                    </div>
                <div class="text-muted small" id="resultsCount">0 results</div>


                <section class="col-12 col-lg-9">
                    <div class="row g-4 results-row" id="resultsGrid">
                        <!-- example card (duplicate as needed) -->
                        <div class="col-12 col-sm-6 col-lg-4 result-card">
                            <article class="img-container card h-100">
                                <div class="img-holder search-media" role="img" aria-label="Item image"></div>
                                <div class="card-body">
                                    <h5 class="card-title">Item Title</h5>
                                    <p class="text-muted mb-2">Location</p>
                                    <span class="fw-bold">10 EUR</span>
                                </div>
                                <div class="card-footer d-flex justify-content-between align-items-center">
                                    <small class="text-muted">Added 2 days ago</small>
                                    <button class="favorite-btn btn btn-outline-danger btn-sm">
                                        <i class="bi bi-heart fs-5"></i>
                                    </button>
                                </div>
                            </article>
                        </div>
                        <!-- /example card -->

                        <div class="col-12 col-sm-6 col-lg-4 result-card">
                            <article class="img-container card h-100">
                                <div class="img-holder search-media" role="img" aria-label="Item image"></div>
                                <div class="card-body">
                                    <h5 class="card-title">Second Item</h5>
                                    <p class="text-muted mb-2">Location</p>
                                    <span class="fw-bold">20 EUR</span>
                                </div>
                                <div class="card-footer d-flex justify-content-between align-items-center">
                                    <small class="text-muted">Added 3 days ago</small>
                                    <button class="favorite-btn btn btn-outline-danger btn-sm">
                                        <i class="bi bi-heart fs-5"></i>
                                    </button>
                                </div>
                            </article>
                        </div>
                        <!-- /example card -->
                    </div>

                    <div class="text-center mt-4 load-more-row">
                        <button class="btn btn-secondary" id="loadMoreBtn">Load more</button>
                    </div>
                    
                </section>
                
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script type="module" src="../Reusable-HTML/components/headerLoader.js"></script>
    <script type="module" src="../Reusable-HTML/components/footerLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/searchpage.js"></script>

</body>
</html>
