<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="./../css/search.css">
    <link rel="stylesheet" href="./../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
</head>
</head>
<body>
    <div class="search-page-example">
        <div class="header">
            <div class="logo"></div>
            <div class="sell"></div>
            <div class="auth"></div>
        </div>

        <div class="search-header">
            <div class="search-query"></div>
            <div class="results count"></div>
        </div>

        <div class="search-content">
            <div class="filters">
                <div class="filter-block">
                    <div class="filter-title">Price</div>
                    <div class="price-inputs">
                        <input type="text" placeholder="min">
                        <input type="text" placeholder="max">
                    </div>
                </div>

                <div class="filter-block">
                    <div class="filter-title">Location</div>
                    <div class="dropdown">Select location</div>
                </div>

                <div class="filter-block">
                    <div class="filter-title">Category</div>
                    <div class="dropdown">Select category</div>
                </div>
                <!-- Condition mb? -->
                <div class="filter-block">
                    <div class="filter-title">Sort by</div>
                    <div class="dropdown">Newest</div>
                </div>
                <div class="filter-actions">
                    <button>Apply filters</button>
                    <button>Reset</button>
                </div>

            </div>

            <div class="results">
                <div class="post-item">
                    <div class="post-image"></div>
                    <div class="post-name"></div>
                    <div class="price"></div>
                    <div class="location"></div>
                    <div class="post-preview-btn"></div>
                </div>
                <div class="post-item">
                </div>
                <div class="post-item">
                </div>

                <div class="load-more">Load more...</div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-logo"></div>
            <div class="footer-content">© 2026 Sunnify. All rights reserved.</div>
        </div>
    </div>
</body>
</html>
